name: deploy-railway

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (production/xgateway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN != '' && secrets.RAILWAY_TOKEN || secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "RAILWAY_TOKEN (or RAILWAY_API_TOKEN) secret is required" >&2
            exit 1
          fi

          # Fast-fail with a clear auth error before deployment.
          railway whoami >/dev/null

          railway up \
            --ci \
            --project 2e0f6dc3-9f5d-453b-a4b1-d05a6310ef0a \
            --environment production \
            --service xgateway
