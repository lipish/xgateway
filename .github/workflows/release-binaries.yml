name: release-binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y musl-tools pkg-config libssl-dev

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          ARTIFACT="xgateway-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist/$ARTIFACT
          cp target/${{ matrix.target }}/release/xgateway dist/$ARTIFACT/
          cp LICENSE README.md dist/$ARTIFACT/
          tar -C dist -czf "$ARTIFACT.tar.gz" "$ARTIFACT"
          shasum -a 256 "$ARTIFACT.tar.gz" > "$ARTIFACT.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgateway-${{ matrix.target }}
          path: |
            xgateway-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            xgateway-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  publish-release:
    needs: build-matrix
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display artifacts
        run: ls -R dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/**/xgateway-*.tar.gz
            dist/**/xgateway-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
